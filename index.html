body{

/* PARTICLES CANVAS */
#particles-js {

}

/* SCROLLBAR (red style) */
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-thumb{
  background: linear-gradient(red,darkred);
  border-radius:10px;
  box-shadow:0 0 10px red;
}
::-webkit-scrollbar-track{
  background: #000;
}

/* HEADER */
header{
  padding:20px 30px;
  text-align:center;
  z-index:2;
  position:relative;
}
.brand{
  font-size:32px;
  color:red;
  text-shadow: 0 0 5px red, 0 0 10px red, 0 0 20px darkred, 0 0 30px red;

.title{
  font-size:16px;
  color:white; /* changed from #aaa to white */
  text-shadow: 0 0 5px white, 0 0 10px white, 0 0 20px #aaa, 0 0 30px white; /* white glow */
  animation: flicker 1.5s infinite alternate;
}

/* FLICKER KEYFRAMES */
@keyframes flicker {
  0%   { text-shadow: 0 0 5px red, 0 0 10px red, 0 0 20px darkred, 0 0 30px red; opacity:1; }
  10%  { text-shadow: 0 0 2px red, 0 0 5px red, 0 0 10px darkred, 0 0 15px red; opacity:0.8; }
  20%  { text-shadow: 0 0 5px red, 0 0 10px red, 0 0 20px darkred, 0 0 30px red; opacity:1; }

  padding:12px 25px;
  border-radius:30px;
  cursor:pointer;
  box-shadow:0 0 25px rgba(255,0,0,0.5);
  overflow:hidden;
  transition:0.3s;
  z-index:2;
}
.btn::after{
  content:'';
  position:absolute;
  width:0;height:100%;
  top:0;left:0;
  background:rgba(255,255,255,0.1);
  transition:0.4s;
}
.btn:hover::after{width:100%;}
.btn:hover{transform:scale(1.05);}

/* VIDEO GRID */
.video-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:15px;
  padding:20px;
  position:relative;
  z-index:2;
}
.video-item{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  backdrop-filter: blur(8px);
  border:1px solid rgba(255,0,0,0.2);
  box-shadow:0 0 15px rgba(255,0,0,0.3);
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}
.video-item.show{opacity:1; transform:translateY(0);}
.video-item img{width:100%; display:block; transition:0.4s;}
.video-item:hover img{transform:scale(1.08) translateY(-5px);}
.video-item::after{
  content:"▶";
  position:absolute;font-size:45px;color:red;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  transition:0.3s;
}
.video-item:hover::after{transform:translate(-50%,-50%) scale(1);}
.video-item video{
  position:absolute;width:100%;height:100%;object-fit:cover;
  top:0;left:0;opacity:0;transition:0.3s;
}
.video-item:hover video{opacity:1;}

/* RESOURCES PAGE */
.resources-page{

  flex-direction:column;

.res-header{

.cancel-btn{

.res-list{

.res-row{

  .res-row{flex-direction:column;align-items:flex-start;}
  .res-btn{margin-left:0;width:100%;}
}
</style>
</head>
