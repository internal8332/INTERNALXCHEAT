// ================== SNOW EFFECT ==================
(function() {
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let snowflakes = [];
    const MAX_SNOWFLAKES = 150;

    function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    function createSnowflake() {
        return {
            x: Math.random() * width,
            y: Math.random() * height - height,
            radius: Math.random() * 3 + 1.5,
            speed: Math.random() * 1.5 + 0.5,
            wind: Math.random() * 1.2 - 0.6,
            opacity: Math.random() * 0.6 + 0.4
        };
    }

    function initSnow() {
        snowflakes = [];
        for (let i = 0; i < MAX_SNOWFLAKES; i++) {
            snowflakes.push(createSnowflake());
        }
    }

    function drawSnow() {
        ctx.clearRect(0, 0, width, height);
        
        snowflakes.forEach(sf => {
            ctx.beginPath();
            ctx.arc(sf.x, sf.y, sf.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${sf.opacity})`;
            ctx.fill();
            
            sf.y += sf.speed;
            sf.x += Math.sin(sf.y * 0.005) * 0.3 + sf.wind * 0.2;
            
            if (sf.y > height + 20) {
                const idx = snowflakes.indexOf(sf);
                snowflakes[idx] = createSnowflake();
                snowflakes[idx].y = -20;
            }
            
            if (sf.x > width + 20) sf.x = -20;
            if (sf.x < -20) sf.x = width + 20;
        });
        
        requestAnimationFrame(drawSnow);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    initSnow();
    drawSnow();
})();
