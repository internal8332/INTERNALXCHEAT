<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #000, #0a0a0a);
  color: #fff;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(red, darkred);
  border-radius: 10px;
  box-shadow: 0 0 10px red;
}

/* HEADER */
header {
  padding: 20px 30px;
}

.brand {
  font-size: 28px;
  color: red;
  text-shadow: 0 0 20px red;
}

.title {
  font-size: 14px;
  color: #aaa;
}

/* HERO */
.hero {
  height: 350px;
  background: linear-gradient(45deg, #000, #1a0000, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
}

.hero h1 { font-size: 40px; }

.hero-btns {
  display: flex;
  gap: 15px;
  margin-top: 20px;
}

.btn {
  background: linear-gradient(45deg, red, darkred);
  padding: 12px 25px;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 0 20px red;
}

/* GRID */
.video-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 15px;
  padding: 20px;
}

/* VIDEO CARD */
.video-item {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  cursor: pointer;
}

.video-item img {
  width: 100%;
  transition: 0.4s;
}

.video-item::after {
  content: "▶";
  position: absolute;
  font-size: 45px;
  color: red;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: 0.3s;
}

.video-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  opacity: 0;
}

.video-item:hover img { transform: scale(1.1); }
.video-item:hover::before { opacity: 1; }
.video-item:hover::after { transform: translate(-50%, -50%) scale(1); }

/* RESOURCES PAGE */
.resources-page {
  position: fixed;
  inset: 0;
  background: #000;
  display: none;
  flex-direction: column;
  z-index: 999;
}

/* TOP BAR */
.res-header {
  padding: 15px;
  background: #111;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cancel-btn {
  background: red;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
}

/* LIST */
.res-list {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  overflow-y: auto;
}

/* ROW */
.res-row {
  display: flex;
  align-items: center;
  gap: 15px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

/* LEFT VIDEO */
.res-row img {
  width: 180px;
  border-radius: 8px;
}

/* RIGHT BUTTON */
.res-btn {
  margin-left: auto;
  background: red;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}

/* RESPONSIVE */
@media(max-width:900px){
  .video-grid { grid-template-columns: repeat(2,1fr); }
  .res-row { flex-direction: column; align-items: flex-start; }
  .res-btn { margin-left: 0; width: 100%; }
}
</style>
</head>
